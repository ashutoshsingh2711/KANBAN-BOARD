<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="kanban.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">Kanban Board</div>
            <div class="right"><button id="toggle-modal">Add new task</button></div>
        </nav>

        <section class="board">
            <div id="todo" class="task-column">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count: <span class="count">0</span></div>
                </div>
            </div>

            <div id="progress" class="task-column">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right">Count: <span class="count">0</span></div>
                </div>
            </div>

            <div id="done" class="task-column">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count: <span class="count">0</span></div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal add-new-task">
        <div class="bg"></div>
        <div class="center">
            <input type="text" placeholder="Task Title" id="task-title-input">
            <textarea placeholder="Task Description" id="task-desc-input"></textarea>
            <label class="due-date-label" for="task-due-input">Due date</label>
            <input type="datetime-local" id="task-due-input">
            <button id="add-new-task" class="add-task-btn">Add Task</button>
            <button id="cancel-task" class="cancel-task-btn">Cancel</button>
        </div>
    </div>

    <script src="kanban.js"></script>
</body>
</html>
